name: Deploy Worker
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Secrets into Wrangler.toml
        run: |
          sed -i "s/REPLACE_DOMAIN/${{ secrets.CLOUDFLARE_DOMAIN }}/g" wrangler.toml
          sed -i "s/REPLACE_ZONE/${{ secrets.CLOUDFLARE_ZONE_NAME }}/g" wrangler.toml
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
